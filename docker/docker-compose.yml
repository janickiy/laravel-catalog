services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: laravel_catalog_app
    env_file:
      - .env.docker
    ports:
      - "8080:80"
    volumes:
      - ..:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    container_name: laravel_catalog_mysql
    environment:
      MYSQL_DATABASE: laravel_catalog
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../catalog.sql:/docker-entrypoint-initdb.d/10-catalog.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
